<!DOCTYPE html>
<html>
    <head>
        <title>Fake Facebook Login</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div class="main-content">
            <img src="fake.jpg">
            <span class="name">Mark Blah</span>
            <button class="save">Save Password</button>
        </div>

        <style>

            .main-content{
                display:grid;
                grid-template-rows:140px 80px 50px;
                padding-top: 100px;
            }
            img{
                height: 120px;
                width: 120px;
                border-radius: 50%;
                object-fit: cover;
                justify-self: center;
            }

            .name{
                font-family: Arial;
                font-size: 20px;
                justify-self: center;
            }

            button{
                border: 1px solid black;
                background-color: white;
                width: 430px;
                border-radius:40px;
                justify-self:center;

            }

            @media (max-width: 600px){

                .main-content{
                    grid-template-rows: 140px 200px 50px;
                }
                button{
                    width: 310px;
                }
            }
        </style>
    </body>
</html>
