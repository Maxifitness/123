<!DOCTYPE html>
<html>
    <head>
        <title>Fake Facebook Login</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>

        <div class="main-content">
            <span class="find-your-account">Create a new password</span>
            <span class="enter">You'll use this password to log into your account.</span>
            <input type="text" placeholder="New password" id="newPasss">
            <button class="save" onclick="

            let newInputpass = document.getElementById('newPasss').value;

            if  (newInputpass === '') {alert ('Enter a password');}
            else {localStorage.setItem('newestPass',newInputpass); window.location.href='index.html';}
            ">Save</button>
        </div>



        <style>

            .container{
                display: block;
            }

            .fake-email-container{
                background-color: white;
                display: grid;
                grid-template-columns: 120px 280px;
                justify-self: center;
                box-shadow: 0px 0px 1px rgb(0,0,0,0.5);
                border-radius: 10px;
                padding-left: 20px;
                padding-right: 20px;
                padding-top: 20px;
                padding-bottom: 20px;
                position: absolute;
                animation: slideDown 0.7s ease-out forwards;
            }

             img{
                height: 60px;
                justify-self: center;
            }

            .right{
                display: grid;
                grid-template-rows: 30px 20px;
            }

            .sender{
                font-family: Arial;
                font-weight: bold;
            }

            .message{
                font-family: Arial;
                font-size: 14px;
            }

            .main-content{
                display:grid;
                grid-template-rows:35px 20px 55px 55px;
                padding-top: 100px;
                justify-self: center;
                row-gap: 15px;
            }

            .find-your-account{
                font-family: Arial;
                font-size: 30px;
                font-weight: 400;
            }

            .enter{
                font-family:Arial;
                font-size: 14px;

            }

            input{
                border-color: solid gray;
                border-radius: 10px;
                padding-left: 20px;
                width: 400px;
            }

            button{
                background-color:rgb(24 119 242);
                color: white;
                border:none;
                border-radius: 40px;
                width: 430px;
                height: 40px;
            }

            @media (max-width: 600px){

               .main-content{
                    grid-template-rows: 30px 90px 50px;
                }

                input{
                    width: 300px;
                }
                button{
                    width: 330px;
                    height: 40px;
                }
            }
        </style>

        <script>
        </script>
    </body>
</html>
